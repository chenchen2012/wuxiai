name: Update News Homepage

on:
  schedule:
    - cron: '17 */2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      WUXIAI_LLM_PROVIDER: ${{ vars.WUXIAI_LLM_PROVIDER }}
      WUXIAI_LLM_API_KEY: ${{ secrets.WUXIAI_LLM_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      WUXIAI_LLM_BASE_URL: ${{ vars.WUXIAI_LLM_BASE_URL }}
      WUXIAI_LLM_MODEL: ${{ vars.WUXIAI_LLM_MODEL }}
      WUXIAI_SUMMARY_BACKFILL_RECENT_DAYS: ${{ vars.WUXIAI_SUMMARY_BACKFILL_RECENT_DAYS }}
      WUXIAI_MAX_SUMMARY_ITEMS_PER_RUN: ${{ vars.WUXIAI_MAX_SUMMARY_ITEMS_PER_RUN }}
      WUXIAI_SUMMARY_WORKERS: ${{ vars.WUXIAI_SUMMARY_WORKERS }}
      WUXIAI_MAX_ITEM_AGE_DAYS: ${{ vars.WUXIAI_MAX_ITEM_AGE_DAYS }}
      WUXIAI_MAX_EXISTING_ITEM_AGE_DAYS: ${{ vars.WUXIAI_MAX_EXISTING_ITEM_AGE_DAYS }}
      WUXIAI_STALE_WEAK_ITEM_AGE_DAYS: ${{ vars.WUXIAI_STALE_WEAK_ITEM_AGE_DAYS }}
      WUXIAI_FRESHNESS_HALF_LIFE_DAYS: ${{ vars.WUXIAI_FRESHNESS_HALF_LIFE_DAYS }}
      WUXIAI_MIN_RELEVANCE_SCORE: ${{ vars.WUXIAI_MIN_RELEVANCE_SCORE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build index.html
        run: python scripts/build_index.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html data.json robots.txt sitemap.xml history.html history-page-*.html company topic region weekly submit
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update homepage news"
            git push
          fi
