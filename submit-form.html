<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="向无锡AI提交新闻线索。">
  <meta name="robots" content="index,follow">
  <link rel="canonical" href="https://wuxiai.com/submit/">
  <title>提交新闻线索 | 无锡AI</title>
  <style>
    :root { --bg: #f5f7fb; --paper: #ffffff; --text: #1f2937; --muted: #6b7280; --line: #e5e7eb; --brand: #1d4ed8; }
    body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; line-height: 1.7; }
    main { max-width: 760px; margin: 32px auto; padding: 0 16px; }
    h1 { margin: 0 0 14px; font-size: 30px; }
    .card { border: 1px solid var(--line); border-radius: 14px; padding: 18px; background: var(--paper); box-shadow: 0 8px 24px rgba(16, 24, 40, 0.04); }
    a { color: var(--brand); text-decoration: none; }
    a:hover { text-decoration: underline; }
    .muted { color: var(--muted); }
    .contact-form { display: grid; gap: 12px; margin-top: 12px; }
    .contact-form label { display: grid; gap: 6px; font-size: 14px; color: #374151; }
    .contact-form input, .contact-form textarea { border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; font: inherit; color: var(--text); background: #fff; }
    .contact-form textarea { min-height: 130px; resize: vertical; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 4px; }
    .btn { display: inline-block; border-radius: 10px; border: 1px solid var(--brand); padding: 9px 14px; font-weight: 600; text-decoration: none; cursor: pointer; }
    .btn-primary { background: var(--brand); color: #fff; }
    .hidden-field { position: absolute; left: -5000px; }
    .home { margin-top: 16px; font-size: 14px; color: var(--muted); }
  </style>
</head>
<body>
  <main>
    <h1>提交新闻线索</h1>
    <div class="card">
      <p class="muted">请填写下面表单。收到之后，如果是真实的无锡、苏州或长三角人工智能相关新闻，我们会整理发布。</p>
      <form name="wuxiai-news-tip" method="POST" action="https://formsubmit.co/chenchen2012@hotmail.com" class="contact-form">
        <input type="hidden" name="_next" value="https://wuxiai.com/contact-success.html">
        <input type="hidden" name="_subject" value="wuxiai.com 新闻线索提交">
        <input type="hidden" name="_captcha" value="false">
        <input type="text" name="_honey" class="hidden-field" tabindex="-1" autocomplete="off">

        <label>
          你的姓名
          <input type="text" name="name" required>
        </label>
        <label>
          你的邮箱
          <input type="email" name="email" required>
        </label>
        <label>
          新闻标题或线索概要
          <input type="text" name="news_title" required>
        </label>
        <label>
          新闻来源链接
          <input type="url" name="news_url" placeholder="https://">
        </label>
        <label>
          线索说明
          <textarea name="message" placeholder="请补充新闻发生时间、地点、相关单位或其他背景..." required></textarea>
        </label>

        <div class="actions">
          <button type="submit" class="btn btn-primary">提交线索</button>
        </div>
      </form>
    </div>
    <p class="home"><a href="/">返回首页</a> · <a href="/contact.html">联系方式</a></p>
  </main>
</body>
</html>
